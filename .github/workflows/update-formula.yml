name: Update formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.0-beta)"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  Version: $VERSION"

      - name: Download binaries and compute SHA256
        id: sha256
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          BASE="https://github.com/TheCloudTheory/Topaz/releases/download/${TAG}"

          curl -fsSL "${BASE}/topaz-osx-arm64" -o topaz-osx-arm64
          curl -fsSL "${BASE}/topaz-osx-x64"   -o topaz-osx-x64

          echo "arm64=$(sha256sum topaz-osx-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum topaz-osx-x64   | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Patch formula
        run: |
          python3 - \
            "${{ steps.tag.outputs.tag }}" \
            "${{ steps.tag.outputs.version }}" \
            "${{ steps.sha256.outputs.arm64 }}" \
            "${{ steps.sha256.outputs.x64 }}" \
          <<'EOF'
          import re, sys

          tag, version, arm64_sha, x64_sha = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]

          with open("Formula/topaz.rb") as f:
              c = f.read()

          c = re.sub(r'version "[^"]+"', f'version "{version}"', c)

          c = re.sub(
              r'(url "https://github\.com/TheCloudTheory/Topaz/releases/download/)[^/]+(/topaz-osx-arm64")',
              rf'\g<1>{tag}\2', c)
          c = re.sub(
              r'(url "https://github\.com/TheCloudTheory/Topaz/releases/download/)[^/]+(/topaz-osx-x64")',
              rf'\g<1>{tag}\2', c)

          c = re.sub(
              r'(url "https://github[^"]+topaz-osx-arm64"\n\s+sha256 ")[a-f0-9]+(")',
              rf'\g<1>{arm64_sha}\2', c)
          c = re.sub(
              r'(url "https://github[^"]+topaz-osx-x64"\n\s+sha256 ")[a-f0-9]+(")',
              rf'\g<1>{x64_sha}\2', c)

          with open("Formula/topaz.rb", "w") as f:
              f.write(c)

          print(f"Patched formula → {version}  arm64={arm64_sha[:12]}…  x64={x64_sha[:12]}…")
          EOF

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update Topaz to ${{ steps.tag.outputs.tag }}"
          branch: "update/${{ steps.tag.outputs.tag }}"
          title: "Update Topaz to ${{ steps.tag.outputs.tag }}"
          body: |
            Automated formula update for Topaz `${{ steps.tag.outputs.tag }}`.

            | Binary | SHA256 |
            |---|---|
            | `topaz-osx-arm64` | `${{ steps.sha256.outputs.arm64 }}` |
            | `topaz-osx-x64`   | `${{ steps.sha256.outputs.x64 }}` |
          labels: pr-pull
